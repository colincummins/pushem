name: Build Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: pushem-linux
            archive_name: pushem-linux.tar.gz
          - os: macos-latest
            artifact_name: pushem-macos
            archive_name: pushem-macos.tar.gz
          - os: windows-latest
            artifact_name: pushem-windows
            archive_name: pushem-windows.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build desktop binary
        shell: bash
        run: ./build_desktop.sh

      - name: Package build output
        shell: bash
        run: |
          mkdir -p release
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            7z a "release/${{ matrix.archive_name }}" ./dist/*
          else
            tar -czf "release/${{ matrix.archive_name }}" -C dist .
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/${{ matrix.archive_name }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/pushem-linux/pushem-linux.tar.gz
            release-assets/pushem-macos/pushem-macos.tar.gz
            release-assets/pushem-windows/pushem-windows.zip
